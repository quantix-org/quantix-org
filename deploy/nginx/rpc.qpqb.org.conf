# Nginx configuration for rpc.qpqb.org
# Proxies requests to the Quantix node JSON-RPC endpoint

upstream quantix_node {
    # Quantix node RPC server
    # Change this to your node's actual address if different
    server 127.0.0.1:8545;
    
    # Add more nodes for load balancing (optional)
    # server 127.0.0.1:8546 backup;
    
    keepalive 32;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=rpc_limit:10m rate=100r/s;
limit_conn_zone $binary_remote_addr zone=rpc_conn:10m;

server {
    listen 80;
    server_name rpc.qpqb.org;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rpc.qpqb.org;

    # SSL certificates (use certbot/Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/rpc.qpqb.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpc.qpqb.org/privkey.pem;
    
    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    
    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS headers for browser requests
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

    # Rate limiting
    limit_req zone=rpc_limit burst=200 nodelay;
    limit_conn rpc_conn 50;

    # Max request body size (for large transactions)
    client_max_body_size 1m;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # JSON-RPC endpoint
    location / {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Only allow POST for JSON-RPC
        limit_except POST {
            deny all;
        }

        # Proxy to Quantix node
        proxy_pass http://quantix_node;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Logging
    access_log /var/log/nginx/rpc.qpqb.org.access.log;
    error_log /var/log/nginx/rpc.qpqb.org.error.log;
}
