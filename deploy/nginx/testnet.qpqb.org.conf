# Nginx configuration for testnet.qpqb.org
# Reverse proxy to Vercel-hosted explorer (optional, if not using Vercel's DNS)

server {
    listen 80;
    server_name testnet.qpqb.org;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name testnet.qpqb.org;

    # SSL certificates (use certbot/Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/testnet.qpqb.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testnet.qpqb.org/privkey.pem;
    
    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to Vercel
    location / {
        proxy_pass https://quantix-explorer.vercel.app;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        
        proxy_set_header Host testnet.qpqb.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Cache static assets
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 1m;
    }

    # Logging
    access_log /var/log/nginx/testnet.qpqb.org.access.log;
    error_log /var/log/nginx/testnet.qpqb.org.error.log;
}
